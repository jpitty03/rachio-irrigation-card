<svg xmlns="http://www.w3.org/2000/svg" width="360" height="460" viewBox="0 0 360 460" font-family="-apple-system, BlinkMacSystemFont, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="cardBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#f7f7f7"/>
    </linearGradient>
  </defs>

  <rect x="6" y="6" width="348" height="448" rx="12" ry="12" fill="url(#cardBg)" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Header -->
  <text x="18" y="30" font-size="15" font-weight="600" fill="#222">Irrigation Quick Run</text>
  <circle cx="296" cy="25" r="4" fill="#4caf50"/>
  <text x="306" y="30" font-size="12" fill="#888">Connected</text>

  <!-- Divider -->
  <line x1="18" y1="42" x2="342" y2="42" stroke="#e0e0e0" stroke-width="1"/>

  <!-- Rain status -->
  <text x="18" y="60" font-size="12" fill="#888">&#9729; Rain Detected</text>
  <text x="342" y="60" font-size="12" fill="#222" text-anchor="end">Dry</text>

  <!-- Progress -->
  <text x="18" y="82" font-size="12" font-weight="600" fill="#222">Zone 1 Running</text>
  <text x="342" y="82" font-size="11" fill="#888" text-anchor="end">5:00 / 10:00</text>
  <rect x="18" y="88" width="324" height="8" rx="4" ry="4" fill="#e0e0e0"/>
  <rect x="18" y="88" width="162" height="8" rx="4" ry="4" fill="#03a9f4"/>

  <!-- Zone buttons -->
  <rect x="18" y="108" width="78" height="64" rx="10" ry="10" fill="#03a9f4" stroke="#03a9f4"/>
  <text x="57" y="130" font-size="18" fill="#fff" text-anchor="middle">&#9881;</text>
  <text x="57" y="148" font-size="10" font-weight="600" fill="#fff" text-anchor="middle">Zone 1</text>
  <text x="57" y="162" font-size="9" fill="#e0f7ff" text-anchor="middle">Front Yard</text>

  <rect x="104" y="108" width="78" height="64" rx="10" ry="10" fill="#ffffff" stroke="#e0e0e0"/>
  <text x="143" y="130" font-size="18" fill="#03a9f4" text-anchor="middle">&#9881;</text>
  <text x="143" y="148" font-size="10" font-weight="600" fill="#222" text-anchor="middle">Zone 2</text>
  <text x="143" y="162" font-size="9" fill="#888" text-anchor="middle">Front Side</text>

  <rect x="190" y="108" width="78" height="64" rx="10" ry="10" fill="#ffffff" stroke="#e0e0e0"/>
  <text x="229" y="130" font-size="18" fill="#03a9f4" text-anchor="middle">&#9881;</text>
  <text x="229" y="148" font-size="10" font-weight="600" fill="#222" text-anchor="middle">Zone 3</text>
  <text x="229" y="162" font-size="9" fill="#888" text-anchor="middle">Far Backyard</text>

  <rect x="276" y="108" width="66" height="64" rx="10" ry="10" fill="#ffffff" stroke="#e0e0e0"/>
  <text x="309" y="130" font-size="18" fill="#03a9f4" text-anchor="middle">&#9881;</text>
  <text x="309" y="148" font-size="10" font-weight="600" fill="#222" text-anchor="middle">Zone 4</text>
  <text x="309" y="162" font-size="9" fill="#888" text-anchor="middle">Backyard</text>

  <!-- Action buttons -->
  <rect x="18" y="184" width="106" height="56" rx="10" ry="10" fill="#ffffff" stroke="#e0e0e0"/>
  <text x="71" y="206" font-size="16" fill="#03a9f4" text-anchor="middle">&#127783;</text>
  <text x="71" y="222" font-size="10" font-weight="600" fill="#222" text-anchor="middle">Rain Delay</text>
  <text x="71" y="234" font-size="9" fill="#888" text-anchor="middle">Off</text>

  <rect x="132" y="184" width="106" height="56" rx="10" ry="10" fill="#ffffff" stroke="#e0e0e0"/>
  <text x="185" y="206" font-size="16" fill="#03a9f4" text-anchor="middle">&#9721;</text>
  <text x="185" y="222" font-size="10" font-weight="600" fill="#222" text-anchor="middle">Standby</text>
  <text x="185" y="234" font-size="9" fill="#888" text-anchor="middle">Off</text>

  <rect x="246" y="184" width="96" height="56" rx="10" ry="10" fill="#ffffff" stroke="#db4437"/>
  <text x="294" y="206" font-size="16" fill="#db4437" text-anchor="middle">&#9940;</text>
  <text x="294" y="222" font-size="10" font-weight="600" fill="#db4437" text-anchor="middle">Stop</text>
  <text x="294" y="234" font-size="9" fill="#db4437" text-anchor="middle">Watering</text>
</svg>