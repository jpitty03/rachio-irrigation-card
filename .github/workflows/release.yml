name: Release

on:
  release:
    types:
      - published

jobs:
  build:
    name: Build card
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build

      - name: Upload build artifact to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/rachio-irrigation-card.js
